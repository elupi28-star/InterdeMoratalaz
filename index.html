<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inter de Moratalaz - Sitio Oficial</title>
  
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      color: #333;
    }
    header {
      background-color: #0f2042; /* Azul oscuro corporativo */
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }
    h2 {
      color: #0f2042;
      border-bottom: 3px solid #e65c00; /* Detalle naranja/fuego */
      padding-bottom: 5px;
    }
    
    /* CONTROL DE LA CUADRÍCULA DE FOTOS */
    .galeria-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .foto-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease-in-out;
    }
    .foto-card:hover {
      transform: translateY(-5px);
    }
    .foto-card img {
      width: 100%;
      height: 220px;
      object-fit: cover; /* Recorta la imagen para que todas midan lo mismo sin deformarse */
      display: block;
    }
    .foto-info {
      padding: 15px;
    }
    .foto-titulo {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
    }
    .loading-text {
      text-align: center;
      grid-column: 1 / -1;
      color: #666;
      font-style: italic;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Inter de Moratalaz</h1>
    <p>Panel General y Galería del Equipo</p>
  </header>

  <main>
    <section>
      <h2>Bienvenidos</h2>
      <p>Espacio oficial del Inter de Moratalaz. Aquí podrás seguir las actualizaciones, fotos de las jornadas y el progreso de nuestros equipos.</p>
    </section>

    <section style="margin-top: 40px;">
      <h2>Galería de Fotos</h2>
      <div id="galeria-fotos" class="galeria-container">
        <p class="loading-text">Cargando las últimas fotos del equipo...</p>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const contenedorGaleria = document.getElementById("galeria-fotos");
      
      // Conexión directa a la API de tu repositorio
      const urlAPI = "https://api.github.com/repos/elupi28-star/InterdeMoratalaz/contents/images/galeria";

      fetch(urlAPI)
        .then(response => {
          if (!response.ok) {
            throw new Error("No se pudo conectar con el servidor de imágenes.");
          }
          return response.json();
        })
        .then(data => {
          // Filtramos para leer solo archivos reales (imágenes) omitiendo carpetas o ficheros ocultos
          const imagenes = data.filter(file => file.type === "file" && !file.name.startsWith('.'));
          
          if (imagenes.length === 0) {
            contenedorGaleria.innerHTML = "<p class='loading-text'>Próximamente subiremos las fotos de los últimos partidos.</p>";
            return;
          }

          // Limpiamos el texto de "Cargando..."
          contenedorGaleria.innerHTML = "";

          // Recorremos las fotos encontradas y las pintamos en el Grid
          imagenes.forEach(foto => {
            const card = document.createElement("div");
            card.className = "foto-card";
            
            // Quitamos la extensión (.jpg, .png) del nombre para usarlo como título limpio si se desea
            const tituloLimpio = foto.name.split('.').slice(0, -1).join('.').replace(/-/g, ' ');

            card.innerHTML = `
              <img src="/images/galeria/${foto.name}" alt="${tituloLimpio}">
              <div class="foto-info">
                <h3 class="foto-titulo">${tituloLimpio}</h3>
              </div>
            `;
            contenedorGaleria.appendChild(card);
          });
        })
        .catch(error => {
          console.error("Error cargando la galería:", error);
          contenedorGaleria.innerHTML = "<p class='loading-text'>No se han podido cargar las fotos en este momento.</p>";
        });
    });
  </script>

</body>
</html>
